<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reflec.xyz | Roblox Infrastructure Expert</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion CDN (UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        window.FramerMotion = window.FramerMotion || window.Motion;
        
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
                    },
                    colors: {
                        blue: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #080A0F; color: white; -webkit-font-smoothing: antialiased; overflow-x: hidden; padding: 0; margin: 0; cursor: none; }
        @media (hover: none) { body { cursor: auto; } }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-border { border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 0 25px rgba(59, 130, 246, 0.1); }
        .scanline { width: 100%; height: 100px; z-index: 99; background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(59, 130, 246, 0.02) 50%, rgba(0, 0, 0, 0) 100%); opacity: 0.1; position: fixed; bottom: 100%; pointer-events: none; animation: scanline 8s linear infinite; }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100px; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #080A0F; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.5); }
        .selection-blue::selection { background: rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="selection-blue">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        const { motion, AnimatePresence, useScroll, useSpring } = FramerMotion;

        const LucideIcon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            const LucideName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
            return <i data-lucide={LucideName} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        const CustomCursor = () => {
            const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
            const [isHovering, setIsHovering] = useState(false);
            useEffect(() => {
                const handleMouseMove = (e) => setMousePosition({ x: e.clientX, y: e.clientY });
                const handleMouseOver = (e) => {
                    const target = e.target;
                    setIsHovering(target.tagName === "A" || target.tagName === "BUTTON" || target.closest("a") || target.closest("button") || target.classList.contains("interactive"));
                };
                window.addEventListener("mousemove", handleMouseMove);
                window.addEventListener("mouseover", handleMouseOver);
                return () => { window.removeEventListener("mousemove", handleMouseMove); window.removeEventListener("mouseover", handleMouseOver); };
            }, []);
            return (
                <React.Fragment>
                    <motion.div className="fixed top-0 left-0 w-8 h-8 rounded-full border border-blue-500/50 pointer-events-none z-[9999] hidden md:block" animate={{ x: mousePosition.x - 16, y: mousePosition.y - 16, scale: isHovering ? 2 : 1, backgroundColor: isHovering ? "rgba(59, 130, 246, 0.1)" : "rgba(59, 130, 246, 0)" }} transition={{ type: "spring", damping: 30, stiffness: 400, mass: 0.5 }} />
                    <motion.div className="fixed top-0 left-0 w-1.5 h-1.5 bg-blue-500 rounded-full pointer-events-none z-[9999] hidden md:block" animate={{ x: mousePosition.x - 3, y: mousePosition.y - 3 }} transition={{ type: "spring", damping: 50, stiffness: 1000, mass: 0.1 }} />
                </React.Fragment>
            );
        };

        const PROJECTS = [
            { id: 1, title: "NEON NEXUS RP", description: "Lead Systems Architect. Designed a server-authoritative inventory & economy system supporting 10k+ concurrent entities with optimized memory overhead.", image: "https://images.unsplash.com/photo-1605810230434-7631ac76ec81?w=800&auto=format&fit=crop&q=60", tags: ["Systems", "Optimization", "UI/UX"], label: "LIVE" },
            { id: 2, title: "KINETIC ARENA", description: "Built a fully custom physics-based combat engine from scratch. Includes active hitboxes, complex animation states, and lag-compensated networking.", image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800&auto=format&fit=crop&q=60", tags: ["Physics", "Combat", "Auth"], label: "ALPHA" }
        ];

        function App() {
            const [copiedUsername, setCopiedUsername] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const [hasEntered, setHasEntered] = useState(false);
            const { scrollYProgress } = useScroll();
            const scaleX = useSpring(scrollYProgress, { stiffness: 100, damping: 30, restDelta: 0.001 });

            const copyToClipboard = useCallback((text, label) => {
                navigator.clipboard.writeText(text);
                setCopiedUsername(label);
                setTimeout(() => setCopiedUsername(null), 2000);
            }, []);

            return (
                <div className="min-h-screen font-sans overflow-x-hidden selection:bg-blue-500/30">
                    <CustomCursor />
                    <AnimatePresence>
                        {!hasEntered && (
                            <motion.div initial={{ opacity: 1 }} exit={{ opacity: 0, scale: 1.1 }} transition={{ duration: 0.8 }} className="fixed inset-0 z-[1000] bg-[#080A0F] flex flex-col items-center justify-center p-6">
                                <div className="scanline"></div>
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="text-center space-y-12">
                                    <h1 className="text-6xl font-bold tracking-tighter italic text-white">reflec.xyz</h1>
                                    <div className="flex flex-col md:flex-row items-center gap-6">
                                        <motion.button whileHover={{ scale: 1.05 }} onClick={() => { setHasEntered(true); setIsPlaying(true); setIsMuted(false); }} className="px-10 py-5 bg-white text-black font-bold rounded-2xl">Sync Audio</motion.button>
                                        <motion.button whileHover={{ scale: 1.05 }} onClick={() => { setHasEntered(true); setIsPlaying(false); setIsMuted(true); }} className="px-10 py-5 glass text-gray-400 rounded-2xl">Silent Init</motion.button>
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <motion.div initial={{ x: -100, opacity: 0 }} animate={{ x: 0, opacity: 1 }} className={`fixed bottom-6 left-6 z-50 flex items-center gap-4 glass p-3 rounded-2xl border-white/10 ${isMuted ? 'opacity-40' : ''}`}>
                        <div className="relative w-12 h-12 rounded-xl overflow-hidden bg-blue-500/20 flex items-center justify-center">
                             <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100&auto=format&fit=crop" className={`w-full h-full object-cover ${isPlaying && !isMuted ? 'animate-spin' : ''}`} />
                             <button onClick={() => { if(isMuted) {setIsMuted(false); setIsPlaying(true);} else {setIsPlaying(!isPlaying);} }} className="absolute inset-0 bg-black/40 hover:bg-black/20" />
                        </div>
                        {isPlaying && !isMuted && (
                            <div className="absolute opacity-0 pointer-events-none -z-50">
                                <iframe src="https://open.spotify.com/embed/track/1L30S9qU3h0tV6nU6Z3uH5?utm_source=generator&theme=0" width="300" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                            </div>
                        )}
                    </motion.div>

                    <div className="max-w-3xl mx-auto px-6 py-24 space-y-24">
                        {/* Hero Section */}
                        <motion.header className="text-center space-y-10">
                            <h1 className="text-6xl font-bold italic">reflec.xyz</h1>
                            <p className="text-gray-400 text-xl">Crafting highly-performant Luau frameworks.</p>
                        </motion.header>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
