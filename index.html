<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Biolink</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Animations */
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
        @keyframes spin-slow {
            100% { transform: rotate(360deg); }
        }
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-shimmer {
            animation: shimmer 1.5s infinite;
        }
        .animate-spin-slow {
            animation: spin-slow 15s linear infinite;
        }
        .animate-spin-disk {
            animation: spin-slow 4s linear infinite;
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.8s ease-out forwards;
        }
        .delay-1 {
            animation-delay: 0.2s;
        }
        .delay-2 {
            animation-delay: 0.4s;
        }
        .delay-3 {
            animation-delay: 0.6s;
        }
    </style>
</head>
<body class="min-h-screen bg-[#050505] text-white relative flex flex-col items-center justify-between p-12 font-sans overflow-hidden">
    <!-- Background Effects -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[10%] right-[0%] w-[30%] h-[50%] bg-blue-500/5 rounded-full blur-[100px]"></div>
    </div>

    <div class="w-full max-w-sm z-20 flex flex-col items-center gap-6 mt-4">
        
        <!-- Profile Avatar -->
        <header class="relative flex flex-col items-center gap-4 w-full group animate-fade-in-up">
            <div class="relative w-28 h-28">
                <div class="absolute inset-0 bg-blue-500 rounded-full blur-md opacity-40 group-hover:opacity-60 transition duration-700 animate-spin-slow"></div>
                <div class="w-full h-full rounded-full border-2 border-blue-400 p-1 relative z-10 transition-transform duration-500 group-hover:scale-105">
                    <div class="w-full h-full rounded-full bg-zinc-800 flex items-center justify-center overflow-hidden border border-zinc-700">
                        <img 
                            src="https://api.dicebear.com/9.x/notionists/svg?seed=Felix&backgroundColor=000000" 
                            alt="Profile Avatar" 
                            class="w-full h-full object-cover"
                        />
                    </div>
                </div>
                <div class="absolute -bottom-1 -right-1 w-8 h-8 bg-blue-500 rounded-full border-4 border-[#050505] flex items-center justify-center z-20">
                    <div class="w-2 h-2 bg-white rounded-full"></div>
                </div>
            </div>

            <!-- Info -->
            <div class="text-center">
                <h1 class="text-3xl font-bold tracking-tight text-white mb-1">
                    reflec
                </h1>
            </div>
        </header>

        <!-- Social Links -->
        <main class="w-full flex flex-col gap-3">
            <a href="https://e-z.bio/cp" class="group relative overflow-hidden bg-white text-black py-4 px-6 rounded-2xl flex items-center justify-between font-bold shadow-[0_0_20px_rgba(255,255,255,0.1)] transition-all duration-300 animate-fade-in-up delay-1 opacity-0" style="animation-fill-mode: forwards;">
                <span class="z-10">My Portal</span>
                <svg class="w-5 h-5 z-10" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
                <!-- Glow sweep effect -->
                <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-black/10 to-transparent group-hover:animate-shimmer"></div>
            </a>

            <a href="#" onclick="copyText('0cuj', 'discord-text', 'discord-icon'); return false;" class="w-full py-4 px-6 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center gap-4 hover:border-blue-500/50 transition-all duration-300 cursor-pointer animate-fade-in-up delay-2 opacity-0" style="animation-fill-mode: forwards;">
                <div class="w-10 h-10 rounded-lg bg-zinc-800 flex items-center justify-center" id="discord-icon">
                    <svg class="w-5 h-5 text-blue-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <span class="font-medium text-zinc-200" id="discord-text">Discord</span>
            </a>

            <a href="#" onclick="copyText('bloqsurveys', 'roblox-text', 'roblox-icon'); return false;" class="w-full py-4 px-6 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center gap-4 hover:border-blue-500/50 transition-all duration-300 cursor-pointer animate-fade-in-up delay-3 opacity-0" style="animation-fill-mode: forwards;">
                <div class="w-10 h-10 rounded-lg bg-zinc-800 flex items-center justify-center" id="roblox-icon">
                    <svg class="w-5 h-5 text-blue-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01"/><path d="M17 12h.01"/><path d="M7 12h.01"/></svg>
                </div>
                <span class="font-medium text-zinc-200" id="roblox-text">Roblox</span>
            </a>
        </main>
    </div>

    <!-- Music Player / MJ Embedded Player -->
    <footer class="w-full max-w-md bg-zinc-900/40 backdrop-blur-xl border border-white/5 rounded-[2.5rem] p-6 mb-4 z-20 mt-8 animate-fade-in-up delay-3 opacity-0" style="animation-fill-mode: forwards;">
        <div class="flex items-center gap-4 mb-4">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg class="w-6 h-6 text-white animate-spin-disk" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="2"/></svg>
            </div>
            <div class="flex-1">
                <h4 class="text-xs font-semibold text-blue-400 uppercase tracking-wider">Now Playing</h4>
                <p class="text-sm font-bold text-white">Michael Jackson</p>
                <p class="text-[10px] text-zinc-500">Billie Jean</p>
            </div>
        </div>
        <div class="w-full rounded-xl overflow-hidden ring-1 ring-blue-500/20">
            <iframe 
                class="w-full h-[120px]"
                src="https://www.youtube.com/embed/Zi_XLOBDo_Y?autoplay=1&controls=1&showinfo=0&rel=0&modestbranding=1&color=white" 
                title="Michael Jackson - Billie Jean" 
                frameBorder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowFullScreen
            ></iframe>
        </div>
    </footer>

    <div class="absolute bottom-8 right-8 flex gap-3 opacity-30 pointer-events-none z-10">
        <div class="w-1 h-1 bg-white rounded-full"></div>
        <div class="w-1 h-1 bg-white rounded-full"></div>
        <div class="w-1 h-1 bg-white rounded-full"></div>
    </div>

    <!-- Scripts -->
    <script>
        const originalIcons = {};
        const originalTexts = {};

        function copyText(val, textId, iconId) {
            navigator.clipboard.writeText(val);
            const textEl = document.getElementById(textId);
            const iconEl = document.getElementById(iconId);
            
            if (!originalTexts[textId]) originalTexts[textId] = textEl.innerText;
            if (!originalIcons[iconId]) originalIcons[iconId] = iconEl.innerHTML;

            textEl.innerText = "Copied to clipboard!";
            iconEl.innerHTML = `<svg class="w-5 h-5 text-green-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

            setTimeout(() => {
                textEl.innerText = originalTexts[textId];
                iconEl.innerHTML = originalIcons[iconId];
            }, 2000);
        }
    </script>
</body>
</html>
